spring:
  mongodb:
    uri: mongodb://localhost:27017/ecom_user
    database: userdb
rabbitmq:
  host: ${RABBITMQ_HOST:localhost}
  port: 5672
  username: guest
  password: guest
  
logging:
  level:
    root: INFO
    com.ecommerce.user: TRACE
  file:
    name: logs/${spring.application.name}.log
  logback:
    rollingpolicy:
      max-file-size: 5MB
      max-history: 7
management:
  endpoints:
    web:
      exposure:
        include: "*"
  tracing:
    sampling:
      probability: 1.0      
      
      

    
