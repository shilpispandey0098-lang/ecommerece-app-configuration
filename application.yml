spring:
  jpa:
    hibernate:
      ddl-auto: update
      show-sql: true
  rabbitmq:
        host: ${RABBITMQ_HOST:localhost}
        port: 5672
        username: guest
        password: guest
eureka:
    client:
        serviceUrl:
            defaultZone: http://localhost:8761/eureka
        register-with-eureka: true
        fetch-registry: true 
management:
  endpoints:
    web:
      exposing:
        include: gateway        

